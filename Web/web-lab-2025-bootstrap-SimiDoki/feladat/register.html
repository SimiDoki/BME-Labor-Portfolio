<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyBlog</title>

    <!-- Bootstrap linkelése CDN-ről -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">

    <!-- Font awesome 6 CDN-ről (solid, regular és brand is) -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.2.0/css/all.css" crossorigin="anonymous">

    <!-- Google font (Muli) letöltése -->
    <link href="https://fonts.googleapis.com/css?family=Muli" rel="stylesheet">

    <!-- Saját CSS -->
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <!-- Navigációs sáv -->
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand" href="https://www.aut.bme.hu">
                <img src="./assets/img/logo-bme-aut.png" alt="BME AUT">
            </a>

            <!-- Hamburger menü  -->
            <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"[]
                aria-controls="navbarSupportedContent" aria-expanded="false" 
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Ez az elem záródik be ha a hamburger ikonra kattintunk -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <!-- Navigációs linkek -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Registration</a>
                    </li>
                    
                </ul>

                <!-- Kereső form -->
                <form class="d-flex mb-0" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <section id="main" class="container py-3">
        <h1 class="display-1">Regiszráció</h1>
    
        <form class="row g-3">
            <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4" name="email" placeholder="Email">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Password</label>
                <input type="password" class="form-control" id="inputPassword4" name="password" placeholder="Password">
            </div>
            <div class="col-12">
                <label for="inputAddress" class="form-label">Address</label>
                <input type="text" class="form-control" id="inputAddress" name="address" placeholder="Address">
            </div>
            <div class="col-md-6">
                <label for="inputCity" class="form-label">City</label>
                <input type="text" class="form-control" id="inputCity" name="city" placeholder="City">
            </div>
            <div class="col-md-4">
                <label for="inputState" class="form-label">State</label>
                <select id="inputState" name="state" class="form-select">
                    <option selected>Choose...</option>
                    <option value="1">Bács-Kiskun megye</option>
                    <option value="2">Baranya megye</option>
                    <option value="3">Békés megye</option>
                    <option value="4">Borsod-Abaúj-Zemplén megye</option>
                    <option value="5">Csongrád-Csanád megye</option>
                    <option value="6">Fejér megye</option>
                    <option value="7">Győr-Moson-Sopron megye</option>
                    <option value="8">Hajdú-Bihar megye</option>
                    <option value="9">Heves megye</option>
                    <option value="10">Jász-Nagykun-Szolnok megye</option>
                    <option value="11">Komárom-Esztergom megye</option>
                    <option value="12">Nógrád megye</option>
                    <option value="13">Pest megye</option>
                    <option value="14">Somogy megye</option>
                    <option value="15">Szabolcs-Szatmár-Bereg megye</option>
                    <option value="16">Tolna megye</option>
                    <option value="17">Vas megye</option>
                    <option value="18">Veszprém megye</option>
                    <option value="19">Zala megye</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="inputZip" class="form-label">Zip</label>
                <input type="number" class="form-control" id="inputZip" name="zip" placeholder="ZIP">
            </div>
            
            <div class="col-12">
                <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gridCheck" name="accept_terms">
                <label class="form-check-label" for="gridCheck">
                    Accept terms
                </label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Sign in</button>
            </div>
        </form>
    </section>
    <!-- TODO: Oldal lábléc formázása -->
    <footer class="p-4 p-4-dark bg-dark" >
        <div class="container">
            <div class="d-flex justify-content-between">
                <p class="m-0">© 2022 BME AUT, All right reserved, Designed by <a href="#">BME AUT</a></p>
                <div class="icons">
                    <a href="#"><i class="fa-brands fa-square-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-square-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous">
        </script>
</body>

</html>
