<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<title>Űrlap kezelés</title>
</head>

<body>
	<form action="/postform.html" method="post">
		<label for="name">Név*:</label>
		<input type="text" id="name" name="name" required>
		<br>
		<br>
		<label for="password">Jelszó*:</label>
		<input type="password" id="password" name="password" value="mobweb" required>
		<br>
		<br>
		<label for="description">Leírás:</label>
		<textarea id="description" name="description"></textarea>
		<br>
		<br>
		<label for="date">Születési dátum*:</label>
		<input type=date id="date" name="date" required>
		<br>
		<br>
		<label for="gender">Nem:</label>
		<select name="gender" id="gender">
			<option value="fiu">Fiú</option>
			<option value="lany">Lány</option>
			<option value="egyeb">Egyéb</option>
		</select>
		<br>
		<br>
		<label for="footsize">Lábméret:</label>
		<input type="number" id="footsize" name="footsize" min="35" max="50" step="0.5">
		<br>
		<br>
		<input type="submit" value="Küldés">
	</form>
</body>

</html>
